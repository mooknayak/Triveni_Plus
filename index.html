<!DOCTYPE html>
<html lang="hi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0284c7" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1595246140625-573b715d11dc?auto=format&fit=crop&q=80&w=192&h=192" />
    <title>Triveni Plus - Triveni Plus Marketplace | नया व पुराना बाज़ार, किसान मंडी, पशुधन व इलेक्ट्रॉनिक्स</title>
  </head>
  <body class="bg-slate-50 text-slate-900 antialiased selection:bg-sky-500 selection:text-white">
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.getRegistrations().then(registrations => {
            for (let registration of registrations) {
              if (registration.active && registration.active.scriptURL.includes('/public/sw.js')) {
                registration.unregister();
              }
            }
          }).catch(() => {});
          navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW reg error:', err));
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
